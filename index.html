<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Ô Chữ: Thành Phần Của Nguyên Tử</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --apple-ease: cubic-bezier(0.25, 0.1, 0.25, 1);
            --apple-spring: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #0f172a); 
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 16:9 PRESENTATION MODE LOCK --- */
        .slide-wrapper {
            width: 100vw;
            height: 56.25vw;
            max-width: 177.78vh;
            max-height: 100vh;
            margin: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .cell-size {
            width: clamp(2rem, 6.2vmin, 5rem);
            height: clamp(2rem, 6.2vmin, 5rem);
            flex-shrink: 0;
        }
        .cell-text { 
            font-size: clamp(1.5rem, 4.2vmin, 3.5rem); 
            font-weight: 900; 
        }

        .btn-size {
            width: clamp(2.5rem, 6.2vmin, 5rem);
            height: clamp(2.5rem, 6.2vmin, 5rem);
            font-size: clamp(1.2rem, 3.5vmin, 2rem);
            flex-shrink: 0;
            font-weight: 800;
        }

        .modal-cell-size {
            width: clamp(3rem, 8vmin, 6rem);
            height: clamp(3.5rem, 10vmin, 7.5rem);
            font-size: clamp(2.5rem, 5.5vmin, 4.5rem);
            flex-shrink: 0;
        }

        /* --- MESH GRADIENT BACKGROUND --- */
        .ambient-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: -2;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.6; 
            animation: orbMove 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 70vw; height: 70vw; background: #0284c7; top: -30vh; left: -10vw; animation-delay: 0s; }
        .orb-2 { width: 60vw; height: 60vw; background: #7c3aed; bottom: -20vh; right: -10vw; animation-delay: -5s; }

        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5vw, 5vh) scale(1.1); }
            100% { transform: translate(-5vw, -5vh) scale(0.9); }
        }

        /* --- GIAO DIỆN KÍNH (SÁNG VÀ NỔI BẬT HƠN) --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .glass-button {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border: 2px solid #7dd3fc;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            transition: all 0.3s var(--apple-ease);
            cursor: pointer;
        }
        .glass-button:hover:not(:disabled) {
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
            border-color: #bae6fd;
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }
        .glass-button:active:not(:disabled) {
            transform: scale(0.95);
        }
        .glass-button.solved {
            background: linear-gradient(135deg, #10b981, #059669); 
            color: #ffffff;
            border-color: #34d399;
            box-shadow: none;
            cursor: default;
        }

        /* --- FLIP CELLS --- */
        .perspective { perspective: 1200px; }
        .flip-inner {
            position: relative;
            width: 100%; height: 100%;
            text-align: center;
            transition: transform 0.6s var(--apple-spring); 
            transform-style: preserve-3d;
        }
        .flip-cell.revealed .flip-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            border-radius: 0.5rem; 
        }
        
        .flip-front {
            background: rgba(255, 255, 255, 0.2); 
            border: 3px solid rgba(255, 255, 255, 0.7); 
            box-shadow: inset 0 0 15px rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .flip-front.keyword-col {
            background: rgba(250, 204, 21, 0.3);
            border: 3px solid #fde047; 
            box-shadow: inset 0 0 20px rgba(250, 204, 21, 0.3);
        }
        
        .flip-cell.clickable:hover .flip-front {
            background: rgba(255, 255, 255, 0.4);
            border-color: #ffffff;
            transform: scale(1.08);
            z-index: 10;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
        .flip-cell.clickable:hover .flip-front.keyword-col {
            background: rgba(250, 204, 21, 0.5);
            border-color: #fef08a;
            transform: scale(1.08);
            z-index: 10;
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.6);
        }

        .flip-back {
            transform: rotateY(180deg);
            background: #ffffff; 
            color: #1e3a8a; 
            border: 3px solid #ffffff;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        .flip-back.keyword-col {
            background: #facc15; 
            color: #7f1d1d; 
            border: 3px solid #facc15;
        }
        
        .flip-back.keyword-finalized {
            background: linear-gradient(135deg, #fde047, #f59e0b);
            color: #7f1d1d; 
            border: 4px solid #fef08a;
            box-shadow: 0 0 40px rgba(250, 204, 21, 0.6), inset 0 2px 10px rgba(255,255,255,0.6);
            transition: all 0.4s ease;
            z-index: 5;
        }

        .morph-anim { animation: textMorphAnim 0.5s ease forwards; }
        .pop-anim { animation: popAnim 0.3s ease forwards; }

        @keyframes textMorphAnim {
            0%   { transform: rotateY(180deg) scale(1); opacity: 1; }
            40%  { transform: rotateY(180deg) scale(0.3) rotateX(90deg); opacity: 0; color: #fff; }
            60%  { transform: rotateY(180deg) scale(1.3) rotateX(0deg); opacity: 1; color: #fff; }
            100% { transform: rotateY(180deg) scale(1); opacity: 1; }
        }
        @keyframes popAnim {
            0%   { transform: rotateY(180deg) scale(1); }
            50%  { transform: rotateY(180deg) scale(1.15); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        /* --- MODAL CÂU HỎI --- */
        #question-modal {
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        #question-modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            transform: scale(0.98);
            transition: transform 0.3s ease;
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95)); 
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        #question-modal.active .modal-content {
            transform: scale(1);
        }

        /* Hiệu ứng Fade-in cho Gợi ý */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hint-animate {
            animation: fadeInDown 0.4s var(--apple-spring) forwards;
        }

        /* --- DECODING BOXES --- */
        .type-box {
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
            border-radius: 0.75rem;
        }
        .type-box.filled {
            background: #ffffff;
            color: #1e3a8a; 
            border-color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .type-box.is-prefilled {
            background: linear-gradient(135deg, #fde047, #f59e0b);
            color: #7f1d1d; 
            border-color: #fef08a;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }
        
        .type-box.decoding {
            background: #0ea5e9; 
            border-color: #7dd3fc; 
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255,255,255,0.9);
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.6) inset;
        }

        @keyframes shakeWrong {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake-error {
            animation: shakeWrong 0.3s ease;
        }
        .shake-error .type-box.filled:not(.is-prefilled),
        .shake-error .type-box:not(.is-prefilled) {
            background: #ef4444; 
            color: #ffffff;
            border-color: #fca5a5;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.5);
        }

        .timer-mini {
            transition: color 0.3s ease;
            font-variant-numeric: tabular-nums;
        }
        .timer-warning {
            color: #fca5a5 !important;
            transform: scale(1.15);
        }

        .grand-win-glow {
            box-shadow: 0 0 100px rgba(250, 204, 21, 0.5), inset 0 0 40px rgba(250, 204, 21, 0.2) !important;
            border-color: rgba(250, 204, 21, 0.8) !important;
            transition: all 1.5s ease;
        }
    </style>
</head>
<body class="selection:bg-white/30">

    <div class="slide-wrapper z-10">
        
        <div class="ambient-bg">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
        </div>

        <header class="w-full text-center py-[4vh] relative z-10 pointer-events-none">
            <h1 class="text-[clamp(2.5rem,6vh,4.5rem)] font-black tracking-[0.2em] text-transparent bg-clip-text bg-gradient-to-r from-cyan-200 via-white to-emerald-200 drop-shadow-[0_0_15px_rgba(34,211,238,0.4)] uppercase">
                Trò Chơi Ô Chữ
            </h1>
        </header>

        <main class="flex-1 flex px-[4vh] pb-[4vh] items-center justify-center relative z-10">
            <div class="w-full h-full flex flex-col gap-[1vh] items-center justify-center glass-panel p-[4vh] rounded-[2rem]" id="crossword-container">
                <!-- Grid ô chữ sẽ được tạo bằng JavaScript -->
            </div>
        </main>

        <div id="question-modal" class="absolute inset-0 z-50 flex flex-col items-center justify-center p-[4vh]">
            <div class="modal-content rounded-[2rem] p-[5vh] w-full max-w-[140vh] flex flex-col items-center text-center relative overflow-hidden">
                
                <div class="mb-[2vh] flex items-center justify-center gap-4 w-full opacity-90">
                    <span class="text-[clamp(1rem,2.5vh,1.5rem)] font-bold tracking-[0.15em] text-cyan-300 uppercase drop-shadow-md" id="q-title">Hàng ngang số X</span>
                    <span class="w-1.5 h-1.5 rounded-full bg-white/50"></span>
                    <span class="text-[clamp(1rem,2vh,1.25rem)] font-bold tracking-wider bg-white/20 border border-white/30 px-4 py-1.5 rounded-lg text-white shadow-inner" id="q-length">X CHỮ CÁI</span>
                    <span class="w-1.5 h-1.5 rounded-full bg-white/50"></span>
                    <span class="text-[clamp(1.5rem,3.5vh,2.5rem)] font-mono timer-mini text-emerald-300 font-black drop-shadow-md" id="timer">15s</span>
                </div>
                
                <p class="text-[clamp(2.2rem,5.5vh,4rem)] font-black leading-snug text-white my-[2vh] w-full drop-shadow-lg" id="q-text">
                    Nội dung câu hỏi...
                </p>

                <!-- === KHUNG GỢI Ý (Sẽ hiện ra khi trả lời sai lần 1) === -->
                <div id="hint-container" class="hidden flex-col items-center justify-center w-full max-w-[90vh] mb-[2vh]">
                    <div class="flex items-center gap-2 mb-[1.5vh] opacity-90">
                        <span class="text-amber-400 text-[clamp(1.5rem,3vh,2rem)]">💡</span>
                        <span class="text-amber-400 font-black text-[clamp(1.2rem,2.5vh,1.8rem)] uppercase tracking-[0.2em] drop-shadow-md">Gợi Ý Hình Ảnh / Câu Hỏi Phụ</span>
                    </div>
                    <!-- Ảnh gợi ý -->
                    <img id="hint-image" src="" alt="Gợi ý" class="hidden max-h-[22vh] object-contain rounded-xl border-2 border-white/20 shadow-[0_5px_20px_rgba(0,0,0,0.5)]">
                    <!-- Văn bản gợi ý -->
                    <p id="hint-text" class="hidden text-[clamp(1.8rem,4vh,3rem)] text-cyan-100 font-semibold italic drop-shadow-lg text-center leading-snug bg-white/10 px-8 py-3 rounded-2xl border border-white/20"></p>
                </div>

                <div id="attempts-container" class="mb-[2vh] text-[clamp(1.2rem,2.5vh,1.8rem)] font-bold text-rose-300 hidden transition-opacity">
                    CƠ HỘI ĐOÁN CÒN LẠI: <span id="attempts-left" class="text-[clamp(1.5rem,3.5vh,2.5rem)] font-black text-white bg-rose-600 px-4 py-1 rounded-xl shadow-[0_0_15px_rgba(225,29,72,0.8)] border border-rose-400">2</span>
                </div>

                <div id="type-area" class="mt-[1vh] mb-[1vh]">
                    <div id="input-boxes" class="flex gap-[1vh] flex-wrap justify-center">
                        <!-- Boxes render here -->
                    </div>
                </div>

                <button onclick="closePanel()" class="mt-[3vh] text-[clamp(1rem,2vh,1.5rem)] text-white/50 hover:text-white transition-colors font-medium">
                    [Nhấn ESC để đóng]
                </button>
            </div>
        </div>

    </div>

    <script>
        const sound = {
            ctx: null,
            decodeTimer: null,
            sfx: {
                correct: new Audio('correct.mp3'),
                wrong: new Audio('wrong-answer-sound-effect.mp3'),
                ding: new Audio('ding-sound-effect_2.mp3'),
                wrongAlt: new Audio('wrong_5.mp3')
            },
            init() {
                if (!this.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playTone(freq, type = 'sine', duration = 0.1, vol = 0.8, slideFreq = null) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (slideFreq) {
                    osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
                }
                
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },

            playOpen() { this.playTone(600, 'sine', 0.15, 1.0, 100); },
            playTick() { this.playTone(1500, 'triangle', 0.05, 0.4); },

            playWrong() { 
                this.sfx.wrong.currentTime = 0;
                let promise = this.sfx.wrong.play();
                if (promise !== undefined) {
                    promise.catch(e => {
                        this.playTone(150, 'sawtooth', 0.3, 1.0); 
                        setTimeout(() => this.playTone(130, 'sawtooth', 0.4, 1.0), 150);
                    });
                }
            },

            playCorrect() {
                this.sfx.correct.currentTime = 0;
                let promise = this.sfx.correct.play();
                if (promise !== undefined) {
                    promise.catch(e => {
                        const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98];
                        notes.forEach((freq, i) => {
                            setTimeout(() => {
                                this.playTone(freq, 'sine', 0.3, 0.6);
                                this.playTone(freq * 1.5, 'triangle', 0.15, 0.2); 
                            }, i * 35); 
                        });
                    });
                }
            },

            playWin() {
                this.sfx.ding.currentTime = 0;
                let promise = this.sfx.ding.play();
                if (promise !== undefined) {
                    promise.catch(e => {
                        [261.63, 311.13, 392.00].forEach(freq => this.playTone(freq, 'square', 1.0, 0.5)); 
                        this.playTone(130.81, 'sawtooth', 1.5, 1.0); 
                        setTimeout(() => {
                            [261.63, 311.13, 392.00].forEach(freq => this.playTone(freq * 2, 'square', 1.5, 0.6));
                        }, 400);
                    });
                }
            },

            playGrandWin() {
                this.sfx.ding.currentTime = 0;
                let promise = this.sfx.ding.play();
                if (promise !== undefined) {
                    promise.catch(e => {
                        this.playTone(1046.50, 'sine', 0.5, 0.6); 
                    });
                }
            },

            startDecode() {
                if(!this.ctx) return;
                this.decodeTimer = setInterval(() => {
                    this.playTone(Math.random() * 800 + 400, 'square', 0.03, 0.15);
                    this.playTone(Math.random() * 1000 + 800, 'sine', 0.02, 0.1);
                }, 30);
            },
            stopDecode() {
                clearInterval(this.decodeTimer);
            }
        };

        document.body.addEventListener('click', () => sound.init(), { once: true });
        document.body.addEventListener('keydown', () => sound.init(), { once: true });

        // --- CẤU TRÚC DỮ LIỆU (TÍCH HỢP HỆ THỐNG GỢI Ý / HINT) ---
        const puzzleData = [
            { id: 1, word: "HẠTNHÂN", clue: "Trung tâm của nguyên tử, chứa proton và neutron", keyIndex: 3, hintType: "image", hintContent: "1.png" },
            { id: 2, word: "VÀNG", clue: "Kim loại Rutherford dùng trong thí nghiệm bắn phá", keyIndex: 3, hintType: "image", hintContent: "2.jpg" },
            { id: 3, word: "AMU", clue: "Đơn vị khối lượng nguyên tử (viết tắt)", keyIndex: 2, hintType: "text", hintContent: "Giá trị của nó bằng 1/12 khối lượng của một nguyên tử đồng vị Carbon-12." },
            { id: 4, word: "HYLẠP", clue: "Nơi Democritus đề xuất khái niệm 'atomos'", keyIndex: 1, hintType: "image", hintContent: "4.jpg" },
            // Đã đổi câu hỏi theo yêu cầu thầy/cô
            { id: 5, word: "ĐIỆNTÍCH", clue: "Đặc điểm chung của proton (+) và electron (-) là...", keyIndex: 2, hintType: "text", hintContent: "Đại lượng này luôn được bảo toàn trong một hệ cô lập và có đơn vị đo trong hệ SI là Coulomb (C)." },
            { id: 6, word: "THOMSON", clue: "Nhà bác học người Anh phát hiện ra electron (1897)", keyIndex: 6, hintType: "image", hintContent: "6.jpg" },
            { id: 7, word: "PROTON", clue: "Hạt mang điện dương trong hạt nhân", keyIndex: 3, hintType: "image", hintContent: "7.jpg" }, // Chân dung Ernest Rutherford
            { id: 8, word: "KÍCHTHƯỚC", clue: "Đặc điểm của nguyên tử, đo bằng pm hoặc Å", keyIndex: 6, hintType: "image", hintContent: "8.png" } 
        ];

        const KEYWORD_COLUMN_INDEX = 6; 
        const TOTAL_COLUMNS = 12;
        const CORRECT_VERTICAL_KEYWORD = ['N', 'G', 'U', 'Y', 'Ê', 'N', 'T', 'Ử'];

        let revealedRows = new Set();
        let keywordRevealed = false;
        let activeRowId = null;
        let activeWordTarget = "";
        let timerInterval;            
        let timeLeft = 15;
        let attemptsLeft = 2;
        let isDecoding = false;

        function renderGrid() {
            const container = document.getElementById('crossword-container');
            container.innerHTML = '';

            puzzleData.forEach(row => {
                const startCol = KEYWORD_COLUMN_INDEX - row.keyIndex;
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex items-center gap-[2vh] w-full justify-center';

                const isRowRevealed = revealedRows.has(row.id);
                const btn = document.createElement('button');
                
                btn.className = `glass-button btn-size rounded-full font-bold flex-shrink-0 flex items-center justify-center z-10 ${
                    isRowRevealed ? 'solved' : ''
                }`;
                btn.innerText = row.id;
                
                if (!isRowRevealed) {
                    btn.onclick = () => openQuestion(row.id);
                } else {
                    btn.disabled = true;
                }
                rowDiv.appendChild(btn);

                const gridDiv = document.createElement('div');
                gridDiv.className = 'flex gap-[3px] perspective';

                for (let i = 0; i < TOTAL_COLUMNS; i++) {
                    const cellContainer = document.createElement('div');
                    const charIndex = i - startCol;
                    const isLetterCell = charIndex >= 0 && charIndex < row.word.length;
                    const isKeywordCol = i === KEYWORD_COLUMN_INDEX;

                    if (isLetterCell) {
                        const letter = row.word[charIndex];
                        const isCellRevealed = isRowRevealed || (isKeywordCol && keywordRevealed);
                        
                        cellContainer.id = `cell-container-${row.id}-${i}`;
                        cellContainer.className = `flip-cell cell-size ${isCellRevealed ? 'revealed' : ''}`;
                        
                        const delay = isRowRevealed && !keywordRevealed ? charIndex * 0.05 : 0;
                        let displayLetter = letter;
                        if (isKeywordCol && keywordRevealed) {
                            displayLetter = CORRECT_VERTICAL_KEYWORD[row.id - 1];
                        }

                        cellContainer.innerHTML = `
                            <div class="flip-inner" id="flip-inner-${row.id}-${i}" style="transition-delay: ${delay}s">
                                <div class="flip-front ${isKeywordCol ? 'keyword-col' : ''}"></div>
                                <div class="flip-back cell-text ${isKeywordCol ? 'keyword-col' : ''} ${isKeywordCol && keywordRevealed ? 'keyword-finalized' : ''}" id="flip-back-${row.id}-${i}">
                                    ${displayLetter}
                                </div>
                            </div>
                        `;

                        if (isKeywordCol && !keywordRevealed) {
                            cellContainer.classList.add('clickable');
                            cellContainer.onclick = () => { sound.init(); revealVerticalKeyword(); };
                            cellContainer.title = "Mở từ khóa NGUYÊN TỬ";
                        } else if (!isRowRevealed && !isKeywordCol) {
                            cellContainer.classList.add('clickable');
                            cellContainer.onclick = () => openQuestion(row.id);
                            cellContainer.title = "Nhấn để xem câu hỏi";
                        }

                    } else {
                        cellContainer.className = 'cell-size bg-transparent';
                    }
                    gridDiv.appendChild(cellContainer);
                }

                rowDiv.appendChild(gridDiv);
                container.appendChild(rowDiv);
            });
        }

        function openQuestion(id) {
            if (revealedRows.has(id)) return;
            if (isDecoding) return;

            sound.init();
            sound.playOpen();
            
            const rowData = puzzleData.find(r => r.id === id);
            activeRowId = id;
            activeWordTarget = rowData.word;
            attemptsLeft = 2;
            isDecoding = false;

            // Reset trạng thái báo lỗi và bộ đếm
            const typeArea = document.getElementById('type-area');
            if(typeArea) typeArea.classList.remove('shake-error');
            const attemptsContainer = document.getElementById('attempts-container');
            if(attemptsContainer) attemptsContainer.classList.add('hidden'); 

            // Ẩn Hint Container mỗi khi mở câu hỏi mới
            const hintContainer = document.getElementById('hint-container');
            hintContainer.classList.add('hidden');
            hintContainer.classList.remove('hint-animate');
            hintContainer.classList.remove('flex'); // Tránh flex làm lộ padding

            const modal = document.getElementById('question-modal');
            modal.classList.add('active');

            document.getElementById('q-title').innerText = `HÀNG NGANG SỐ ${id}`;
            document.getElementById('q-length').innerText = `${rowData.word.length} CHỮ CÁI`;
            document.getElementById('q-text').innerText = rowData.clue;

            const boxesContainer = document.getElementById('input-boxes');
            boxesContainer.innerHTML = '';
            for(let i = 0; i < activeWordTarget.length; i++) {
                const isKeyCell = (i === rowData.keyIndex) && keywordRevealed;
                if (isKeyCell) {
                    const knownLetter = activeWordTarget[i];
                    boxesContainer.innerHTML += `<div class="type-box is-prefilled modal-cell-size flex items-center justify-center font-black uppercase">${knownLetter}</div>`;
                } else {
                    boxesContainer.innerHTML += `<div class="type-box modal-cell-size flex items-center justify-center font-black uppercase empty-box"></div>`;
                }
            }

            startTimer();
        }

        // --- BỘ LẮNG NGHE PHÍM TẮT Y / N ---
        document.body.addEventListener('keydown', (e) => {
            if (activeRowId === null) return;
            if (isDecoding) return;

            const key = e.key.toLowerCase();
            
            if (key === 'y') {
                sound.init();
                runDecodingAnimation(); 
            } else if (key === 'n') {
                sound.init();
                submitWrong(); 
            } else if (e.key === 'Escape') {
                closePanel();
            }
        });

        // --- HIỂN THỊ GỢI Ý ---
        function showHint() {
            const rowData = puzzleData.find(r => r.id === activeRowId);
            if (!rowData) return;

            const hintContainer = document.getElementById('hint-container');
            const hintImage = document.getElementById('hint-image');
            const hintText = document.getElementById('hint-text');

            // Xóa class hidden, thêm class flex và class hiệu ứng fade in
            hintContainer.classList.remove('hidden');
            hintContainer.classList.add('flex', 'hint-animate');

            // Xử lý dữ liệu Hint
            if (rowData.hintType === 'image') {
                hintImage.src = rowData.hintContent;
                hintImage.classList.remove('hidden');
                hintText.classList.add('hidden');
            } else if (rowData.hintType === 'text') {
                hintText.innerText = rowData.hintContent;
                hintText.classList.remove('hidden');
                hintImage.classList.add('hidden');
            }
        }

        // --- KĨ XẢO DECODING ---
        function runDecodingAnimation() {
            isDecoding = true;
            clearInterval(timerInterval);
            sound.startDecode();

            const boxes = document.querySelectorAll('#input-boxes > .empty-box');
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0101";
            const rowData = puzzleData.find(r => r.id === activeRowId);

            let targetChars = [];
            for (let i = 0; i < activeWordTarget.length; i++) {
                const isKeyCell = (i === rowData.keyIndex) && keywordRevealed;
                if (!isKeyCell) {
                    targetChars.push(activeWordTarget[i]);
                }
            }

            boxes.forEach((box, index) => {
                box.classList.add('decoding');
                
                let interval = setInterval(() => {
                    box.innerText = chars[Math.floor(Math.random() * chars.length)];
                }, 50);

                setTimeout(() => {
                    clearInterval(interval);
                    box.classList.remove('decoding');
                    box.classList.add('filled');
                    box.innerText = targetChars[index]; 
                }, 300 + (index * 120)); 
            });

            const totalAnimationTime = 300 + ((boxes.length - 1) * 120);
            
            setTimeout(() => {
                sound.stopDecode();
                submitCorrect();
            }, totalAnimationTime + 200);
        }

        function submitCorrect() {
            sound.playCorrect();
            revealedRows.add(activeRowId);
            closePanel();
            renderGrid();
            
            if(revealedRows.size === puzzleData.length) {
                if (!keywordRevealed) {
                    setTimeout(() => revealVerticalKeyword(), 1000); 
                    setTimeout(() => triggerGrandWin(), 2500);
                } else {
                    setTimeout(() => triggerGrandWin(), 800);
                }
            }
        }

        // --- XỬ LÝ SAI & KÍCH HOẠT GỢI Ý ---
        function submitWrong() {
            attemptsLeft--;
            sound.playWrong();
            
            const typeArea = document.getElementById('type-area');
            typeArea.classList.remove('shake-error');
            void typeArea.offsetWidth; 
            typeArea.classList.add('shake-error');

            const attemptsContainer = document.getElementById('attempts-container');
            attemptsContainer.classList.remove('hidden');
            document.getElementById('attempts-left').innerText = attemptsLeft;
            
            setTimeout(() => {
                typeArea.classList.remove('shake-error'); 
                
                if (attemptsLeft <= 0) {
                    closePanel(); 
                } else {
                    // CÒN 1 LƯỢT: Bật hệ thống Gợi Ý (Hint System)
                    showHint();
                }
            }, 600); 
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 15;
            
            const timerEl = document.getElementById('timer');
            timerEl.innerText = timeLeft + 's';
            timerEl.classList.remove('timer-warning');

            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft + 's';
                
                if (timeLeft <= 5 && timeLeft > 0) {
                    timerEl.classList.add('timer-warning');
                    sound.playTick(); 
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerEl.innerText = "0s";
                }
            }, 1000);
        }

        function closePanel() {
            clearInterval(timerInterval);
            activeRowId = null;
            isDecoding = false; 
            document.getElementById('question-modal').classList.remove('active');
        }

        function revealVerticalKeyword() {
            if(keywordRevealed) return;
            keywordRevealed = true;
            sound.playWin();

            puzzleData.forEach((row, index) => {
                const targetLetter = CORRECT_VERTICAL_KEYWORD[index];
                const colIndex = KEYWORD_COLUMN_INDEX;

                const cellContainer = document.getElementById(`cell-container-${row.id}-${colIndex}`);
                const flipBack = document.getElementById(`flip-back-${row.id}-${colIndex}`);

                if (cellContainer && flipBack) {
                    const delay = index * 120; 

                    setTimeout(() => {
                        if (revealedRows.has(row.id)) {
                            if (flipBack.innerText.trim() !== targetLetter) {
                                flipBack.classList.add('morph-anim');
                                setTimeout(() => { flipBack.innerText = targetLetter; }, 250); 
                            } else {
                                flipBack.classList.add('pop-anim');
                            }
                        } else {
                            flipBack.innerText = targetLetter;
                            cellContainer.classList.add('revealed');
                        }
                        flipBack.classList.add('keyword-finalized');
                    }, delay);
                }
            });
        }

        function triggerGrandWin() {
            sound.playGrandWin();
            const container = document.getElementById('crossword-container');
            container.classList.add('grand-win-glow');
        }

        renderGrid();
    </script>
</body>
</html>
